<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cotizar Envío - Encomiendas, viajes y demás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4">Cotizador de Envíos</h2>
    <div class="card card-apple p-4 col-md-6 mx-auto">
        <form id="cotizar-form">
            <div class="mb-3">
                <label>Origen</label>
                <select id="origen" class="form-control form-control-apple" required>
                    <option value="Iquique">Iquique</option>
                    <option value="Antofagasta">Antofagasta</option>
                    <option value="Santiago">Santiago</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Destino</label>
                <select id="destino" class="form-control form-control-apple" required>
                    <option value="Santiago">Santiago</option>
                    <option value="Antofagasta">Antofagasta</option>
                    <option value="Iquique">Iquique</option>
                </select>
            </div>
            <div class="row">
                <div class="col">
                    <label>Peso (kg)</label>
                    <input type="number" id="peso" class="form-control form-control-apple" required>
                </div>
            </div>
           <button type="submit" class="btn btn-apple-primary w-100 mt-4">Calcular Precio</button>
    
              <a href="index.html" class="btn btn-apple-secondary w-100 mt-3">Volver al inicio</a>
        
        </form>
        <div id="resultado" class="mt-3 p-3 border-top d-none">
            <h5>Precio estimado: <span id="precio"></span></h5>
        </div>
    </div>
</div>

<script src="cotizador.js"></script>
</body>
</html>
